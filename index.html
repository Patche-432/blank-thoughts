<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>blank-thoughts • bot</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      :root{
        --bg:#0f0f10; --surface:#17171a; --surface2:#1f1f24;
        --border:rgba(255,255,255,.10); --text:#eaeaea; --muted:#a0a0a7;
        --good:#4caf50; --bad:#ff5252; --warn:#ffb300;
        --radius:12px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      }
      body{
        margin:0; font-family:var(--font); background:var(--bg); color:var(--text);
        min-height:100vh; display:flex; justify-content:center;
      }
      .wrap{ width:min(980px, 100%); padding:20px; display:flex; flex-direction:column; gap:16px; }
      .row{ display:flex; gap:12px; flex-wrap:wrap; align-items:stretch; }
      .card{
        background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
        padding:14px; flex:1; min-width:280px;
      }
      h1{ font-size:16px; margin:0 0 10px; letter-spacing:-.01em; }
      .sub{ color:var(--muted); font-size:12px; }
      .pill{ display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; border:1px solid var(--border); background:var(--surface2); }
      .dot{ width:8px; height:8px; border-radius:50%; background:var(--bad); }
      .dot.ok{ background:var(--good); }
      .dot.warn{ background:var(--warn); }
      label{ display:block; font-size:12px; color:var(--muted); margin:10px 0 6px; }
      input{
        width:100%; padding:10px 12px; border-radius:10px;
        border:1px solid var(--border); background:var(--surface2); color:var(--text);
        outline:none;
      }
      input:focus{ border-color:rgba(255,255,255,.25); }
      .btnrow{ display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
      button{
        padding:10px 12px; border-radius:10px; border:1px solid var(--border);
        background:#eaeaea; color:#101010; cursor:pointer; font-weight:600;
      }
      button.secondary{ background:transparent; color:var(--text); }
      button:disabled{ opacity:.45; cursor:not-allowed; }
      pre{
        margin:10px 0 0; padding:12px; border-radius:10px;
        border:1px solid var(--border); background:var(--surface2);
        overflow:auto; font-size:12px; line-height:1.5;
      }
      .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
      @media (max-width:720px){ .grid2{ grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <div class="card">
          <h1>MT5 Bot</h1>
          <div class="row" style="justify-content:space-between; align-items:center;">
            <div class="pill">
              <span class="dot" id="healthDot"></span>
              <span class="sub" id="healthText">checking server…</span>
            </div>
            <div class="pill">
              <span class="dot warn" id="botDot"></span>
              <span class="sub" id="botText">unknown</span>
            </div>
          </div>
          <div class="sub" style="margin-top:10px;">
            Safety: bot control requires <code>BOT_ENABLE=1</code>. Live orders require <code>BOT_DRY_RUN=0</code> and <code>BOT_ALLOW_LIVE=1</code>.
          </div>
        </div>
        <div class="card">
          <h1>Actions</h1>
          <div class="grid2">
            <div>
              <label>Symbol</label>
              <input id="symbol" value="EURUSD" />
            </div>
            <div>
              <label>Volume (lots)</label>
              <input id="volume" type="number" step="0.01" value="0.01" />
            </div>
            <div>
              <label>Poll seconds</label>
              <input id="poll" type="number" step="1" value="10" />
            </div>
            <div>
              <label>Bar count</label>
              <input id="bars" type="number" step="1" value="250" />
            </div>
            <div>
              <label>Max positions</label>
              <input id="maxpos" type="number" step="1" value="1" />
            </div>
            <div>
              <label>Dry run</label>
              <input id="dryrun" value="true" />
            </div>
            <div>
              <label>AI mode (off|heuristic|llm)</label>
              <input id="aimode" value="heuristic" />
            </div>
            <div>
              <label>Max spread (points, optional)</label>
              <input id="maxspread" placeholder="e.g. 25" />
            </div>
          </div>
          <div class="btnrow">
            <button id="startBtn">Start</button>
            <button id="stopBtn" class="secondary">Stop</button>
            <button id="refreshBtn" class="secondary">Refresh</button>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="card">
          <h1>Status JSON</h1>
          <pre id="statusPre">{}</pre>
        </div>
        <div class="card">
          <h1>Last signal</h1>
          <pre id="signalPre">{}</pre>
        </div>
      </div>
    </div>

    <script>
      const statusPre = document.getElementById("statusPre");
      const signalPre = document.getElementById("signalPre");
      const healthDot = document.getElementById("healthDot");
      const healthText = document.getElementById("healthText");
      const botDot = document.getElementById("botDot");
      const botText = document.getElementById("botText");

      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const refreshBtn = document.getElementById("refreshBtn");

      function val(id){ return document.getElementById(id).value; }
      function jsonPretty(obj){ return JSON.stringify(obj, null, 2); }
      function setBusy(b){
        startBtn.disabled = b; stopBtn.disabled = b; refreshBtn.disabled = b;
      }

      async function health(){
        try{
          const res = await fetch("/health", { signal: AbortSignal.timeout(1500) });
          if(!res.ok) throw new Error("HTTP " + res.status);
          healthDot.classList.add("ok");
          healthText.textContent = "server online";
          return true;
        }catch{
          healthDot.classList.remove("ok");
          healthText.textContent = "server offline";
          return false;
        }
      }

      function setBotPill(enabled, running){
        if(!enabled){
          botDot.className = "dot warn";
          botText.textContent = "bot disabled (set BOT_ENABLE=1)";
          return;
        }
        if(running){
          botDot.className = "dot ok";
          botText.textContent = "running";
        }else{
          botDot.className = "dot warn";
          botText.textContent = "stopped";
        }
      }

      async function loadStatus(){
        const res = await fetch("/bot/status", { signal: AbortSignal.timeout(4000) });
        const data = await res.json();
        statusPre.textContent = jsonPretty(data);
        signalPre.textContent = jsonPretty(data.last_signal || {});
        setBotPill(data.enabled, data.running);
        return data;
      }

      async function start(){
        setBusy(true);
        try{
          const dry = (val("dryrun") || "true").trim().toLowerCase();
          const body = {
            symbol: val("symbol"),
            volume: Number(val("volume")),
            poll_secs: Number(val("poll")),
            bar_count: Number(val("bars")),
            max_pos: Number(val("maxpos")),
            dry_run: !(dry === "false" || dry === "0" || dry === "no" || dry === "off"),
            ai_mode: (val("aimode") || "heuristic").trim(),
            max_spread_points: (val("maxspread") || "").trim() ? Number(val("maxspread")) : null
          };
          const res = await fetch("/bot/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data.error || ("HTTP " + res.status));
          await loadStatus();
        }catch(e){
          alert("Start failed: " + e.message);
        }finally{
          setBusy(false);
        }
      }

      async function stop(){
        setBusy(true);
        try{
          const res = await fetch("/bot/stop", { method:"POST" });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data.error || ("HTTP " + res.status));
          await loadStatus();
        }catch(e){
          alert("Stop failed: " + e.message);
        }finally{
          setBusy(false);
        }
      }

      startBtn.addEventListener("click", start);
      stopBtn.addEventListener("click", stop);
      refreshBtn.addEventListener("click", loadStatus);

      (async () => {
        await health();
        try{ await loadStatus(); }catch{}
        setInterval(health, 8000);
        setInterval(() => { loadStatus().catch(() => {}); }, 5000);
      })();
    </script>
  </body>
</html>
