<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>blank-thoughts</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111110;
    --surface: #1a1a18;
    --surface2: #242422;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e8e4;
    --text2: #9a9a96;
    --text3: #505050;
    --user-bg: #2a2a44;
    --user-text: #a0a8f0;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  #header .left { display: flex; flex-direction: column; gap: 2px; }
  #header .title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  #header .sub { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
  .dot.on { background: #4caf50; }

  #clear-btn {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: 0.5px solid var(--border2);
    cursor: pointer;
    font-family: var(--font);
    padding: 5px 10px;
    border-radius: var(--radius-sm);
  }
  #clear-btn:hover { color: var(--text2); border-color: var(--text3); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .empty {
    margin: auto;
    color: var(--text3);
    font-size: 14px;
    text-align: center;
  }

  .msg { display: flex; gap: 10px; max-width: 75%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; margin-top: 2px;
  }
  .msg.user .avatar { background: var(--user-bg); color: var(--user-text); }
  .msg.bot  .avatar { background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border2); }

  .bubble-wrap { display: flex; flex-direction: column; gap: 4px; }

  .bubble {
    padding: 10px 14px;
    font-size: 14px; line-height: 1.65;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bg); color: var(--user-text);
    border-radius: 16px 16px 4px 16px;
  }
  .msg.bot .bubble {
    background: var(--surface); color: var(--text);
    border: 0.5px solid var(--border2);
    border-radius: 16px 16px 16px 4px;
  }

  .ts { font-size: 11px; color: var(--text3); }
  .msg.user .ts { text-align: right; }

  /* Typing indicator */
  .typing-wrap {
    display: flex; gap: 10px; align-self: flex-start;
  }
  .typing-dots {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 16px 16px 16px 4px;
  }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3);
    animation: blink 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  .generating-label {
    font-size: 11px; color: var(--text3);
    margin-top: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  #input-area {
    padding: 12px 20px 18px;
    border-top: 0.5px solid var(--border);
    background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    font-family: var(--font); font-size: 14px; line-height: 1.5;
    padding: 10px 14px;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    background: var(--surface2); color: var(--text);
    resize: none; max-height: 140px; overflow-y: auto;
    transition: border-color 0.15s;
  }
  #msg-input:focus { outline: none; border-color: rgba(255,255,255,0.25); }
  #msg-input::placeholder { color: var(--text3); }
  #msg-input:disabled { opacity: 0.5; }

  #send-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: none; background: #e8e8e4; color: #111110;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 15px; height: 15px; }
</style>
</head>
<body>

<div id="header">
  <div class="left">
    <span class="title">blank-thoughts</span>
    <span class="sub"><span class="dot" id="dot"></span><span id="status-text">connecting...</span></span>
  </div>
  <button id="clear-btn">Clear</button>
</div>

<div id="messages">
  <div class="empty" id="empty">Start a conversation</div>
</div>

<div id="input-area">
  <textarea id="msg-input" rows="1" placeholder="Message..."></textarea>
  <button id="send-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
const API = "http://localhost:5000/chat";
let history = [];
let busy = false;

const messagesEl = document.getElementById("messages");
const msgInput   = document.getElementById("msg-input");
const sendBtn    = document.getElementById("send-btn");
const dot        = document.getElementById("dot");
const statusText = document.getElementById("status-text");

async function ping() {
  try {
    const res = await fetch("http://localhost:5000/", { signal: AbortSignal.timeout(2000) });
    if (res.ok) { dot.classList.add("on"); statusText.textContent = "connected"; return; }
  } catch {}
  dot.classList.remove("on");
  statusText.textContent = "server offline";
}
ping();
setInterval(ping, 8000);

document.getElementById("clear-btn").addEventListener("click", () => {
  if (busy) return;
  history = [];
  messagesEl.innerHTML = "";
  const e = document.createElement("div");
  e.className = "empty"; e.id = "empty"; e.textContent = "Start a conversation";
  messagesEl.appendChild(e);
});

sendBtn.addEventListener("click", send);
msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
msgInput.addEventListener("input", () => {
  msgInput.style.height = "auto";
  msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + "px";
});

function setInputEnabled(enabled) {
  busy = !enabled;
  msgInput.disabled = !enabled;
  sendBtn.disabled = !enabled;
}

function ts() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function appendMsg(role, text) {
  const empty = document.getElementById("empty");
  if (empty) empty.remove();
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const initials = role === "user" ? "You" : "BT";
  const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  wrap.innerHTML = `
    <div class="avatar">${initials}</div>
    <div class="bubble-wrap">
      <div class="bubble">${escaped}</div>
      <div class="ts">${ts()}</div>
    </div>`;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function appendTyping() {
  const empty = document.getElementById("empty");
  if (empty) empty.remove();
  const wrap = document.createElement("div");
  wrap.className = "typing-wrap";
  wrap.id = "typing-indicator";
  wrap.innerHTML = `
    <div class="avatar" style="width:28px;height:28px;border-radius:50%;background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-top:2px;flex-shrink:0;">BT</div>
    <div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <div class="generating-label">generating...</div>
    </div>`;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

async function send() {
  if (busy) return;
  const text = msgInput.value.trim();
  if (!text) return;

  msgInput.value = "";
  msgInput.style.height = "auto";
  setInputEnabled(false);

  appendMsg("user", text);
  history.push({ role: "user", content: text });

  const typing = appendTyping();

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history, system: "You are a helpful assistant.", max_new_tokens: 512 })
    });

    typing.remove();

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error("HTTP " + res.status + (errData.error ? ": " + errData.error : ""));
    }

    const data = await res.json();
    const reply = data.reply || data.message || data.content || JSON.stringify(data);
    history.push({ role: "assistant", content: reply });
    appendMsg("bot", reply);

  } catch (err) {
    typing.remove();
    appendMsg("bot", "Error: " + err.message);
  } finally {
    setInputEnabled(true);
    msgInput.focus();
  }
}
</script>
</body>
</html>
